<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>

    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="75%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="320" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="url(#bgGrad)"/>

    <g filter="url(#softBlur)">
      <circle cx="220" cy="90" r="150" fill="url(#blob1)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 40 25; -20 15; 0 0" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="230" r="170" fill="url(#blob2)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -35 -20; 20 10; 0 0" dur="16s" repeatCount="indefinite"/>
      </circle>
      <circle cx="620" cy="60" r="130" fill="url(#blob3)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 25 30; -30 -10; 0 0" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="270" r="140" fill="url(#blob4)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -25 -15; 30 20; 0 0" dur="20s" repeatCount="indefinite"/>
      </circle>
    </g>

    <rect x="0" y="0" width="1200" height="320" fill="#050507" opacity="0.28"/>

    <g opacity="0.9">
      <rect x="330" y="88" width="540" height="150" rx="24" fill="#ffffff" opacity="0.02"/>
      <rect x="330" y="88" width="540" height="150" rx="24" fill="none" stroke="#a78bfa" stroke-opacity="0.18" stroke-width="1"/>
    </g>

    <line x1="380" y1="128" x2="820" y2="128" stroke="url(#lineGrad)" stroke-width="1.5">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/>
    </line>

    <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="52" font-weight="700" letter-spacing="6" fill="url(#titleGrad)">
      ANANNYA AK
      <animate attributeName="opacity" values="0;1" dur="1.6s" begin="0s" fill="freeze"/>
    </text>

    <text x="600" y="212" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="16.5" font-weight="400" letter-spacing="3" fill="#c7c9e0" opacity="0.85">
      COMPUTER SCIENCE ENGINEERING &#8226; DATA SCIENCE
      <animate attributeName="opacity" values="0;0.85" dur="2s" begin="0.4s" fill="freeze"/>
    </text>

    <line x1="380" y1="232" x2="820" y2="232" stroke="url(#lineGrad)" stroke-width="1">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="18" fill="none" stroke="#a78bfa" stroke-opacity="0.15"/>
</svg>
