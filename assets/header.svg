<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>

    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d8cbff"/>
      <stop offset="45%" stop-color="#b39dfb"/>
      <stop offset="75%" stop-color="#8f97fb"/>
      <stop offset="100%" stop-color="#71b1ff"/>
    </linearGradient>

    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>

    <mask id="titleMask">
      <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="54" font-weight="700" letter-spacing="6" fill="#ffffff">
        ANANNYA AK
      </text>
    </mask>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="320" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="url(#bgGrad)"/>

    <g filter="url(#softBlur)">
      <circle cx="220" cy="90" r="160" fill="url(#blob1)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 110 60; -80 40; 0 0" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="230" r="180" fill="url(#blob2)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -95 -55; 75 35; 0 0" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="620" cy="60" r="140" fill="url(#blob3)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 70 80; -85 -25; 0 0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="270" r="150" fill="url(#blob4)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -70 -40; 90 50; 0 0" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <rect x="0" y="0" width="1200" height="320" fill="#050507" opacity="0.2"/>

    <!-- bright twinkling accent stars -->
    <g fill="#e0d4ff" filter="url(#glow)">
      <circle cx="150" cy="60" r="3"><animate attributeName="opacity" values="0.05;1;0.05" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="80" r="3.4"><animate attributeName="opacity" values="0.05;1;0.05" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="1000" cy="270" r="2.8"><animate attributeName="opacity" values="0.05;1;0.05" dur="1.8s" begin="0.7s" repeatCount="indefinite"/></circle>
      <circle cx="120" cy="250" r="3"><animate attributeName="opacity" values="0.05;1;0.05" dur="2.2s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="600" cy="30" r="2.6"><animate attributeName="opacity" values="0.05;1;0.05" dur="1.9s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="870" cy="45" r="2.8"><animate attributeName="opacity" values="0.05;1;0.05" dur="1.5s" begin="0.15s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="290" r="2.6"><animate attributeName="opacity" values="0.05;1;0.05" dur="2.4s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="1130" cy="180" r="3"><animate attributeName="opacity" values="0.05;1;0.05" dur="1.7s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="160" r="2.6"><animate attributeName="opacity" values="0.05;1;0.05" dur="2.1s" begin="1.3s" repeatCount="indefinite"/></circle>
    </g>

    <g opacity="0.95">
      <rect x="320" y="82" width="560" height="160" rx="24" fill="#ffffff" opacity="0.03"/>
      <rect x="320" y="82" width="560" height="160" rx="24" fill="none" stroke-width="1.4">
        <animate attributeName="stroke" values="#a78bfa;#60a5fa;#8b5cf6;#a78bfa" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="2.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <line x1="380" y1="128" x2="820" y2="128" stroke="url(#lineGrad)" stroke-width="2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <g>
      <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="54" font-weight="700" letter-spacing="6" fill="url(#titleGrad)" filter="url(#glow)">
        ANANNYA AK
      </text>
    </g>

    <!-- bright animated light sweep across the title, masked to the letters -->
    <g mask="url(#titleMask)">
      <rect x="-350" y="115" width="200" height="90" fill="url(#sweepGrad)">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 1500 0" dur="2.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="600" y="212" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="17" font-weight="400" letter-spacing="3" fill="#dcdcf5" opacity="0.9">
      COMPUTER SCIENCE ENGINEERING &#8226; DATA SCIENCE
    </text>

    <line x1="380" y1="232" x2="820" y2="232" stroke="url(#lineGrad)" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="18" fill="none" stroke-width="1.5">
    <animate attributeName="stroke" values="#a78bfa;#60a5fa;#8b5cf6;#a78bfa" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
